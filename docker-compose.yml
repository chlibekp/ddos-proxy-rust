services:
  ddos-proxy:
    build:
      context: .
      args:
        # "xdp" compiles in eBPF/XDP Layer-4 blocking (matches the Go image,
        # which always built the XDP program). Requires the caps below.
        FEATURES: xdp
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
    # All configuration comes from .env (see .env.example for the keys).
    env_file:
      - .env
    restart: unless-stopped
