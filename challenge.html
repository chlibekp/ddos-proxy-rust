<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    {% if site_key %}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script>
        function submitForm() {
            document.getElementById("challenge-form").submit();
        }
    </script>
    {% else %}
    <script>
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function solvePoWSingleThread(salt, targetPrefix, startTime) {
            let nonce = 0;

            while (true) {
                const hash = await sha256(salt + nonce);
                if (hash.startsWith(targetPrefix)) {
                    const elapsed = Date.now() - startTime;
                    if (elapsed < 2000) {
                        await new Promise(resolve => setTimeout(resolve, 2000 - elapsed));
                    }
                    document.getElementById("pow-nonce").value = nonce;
                    document.getElementById("challenge-form").submit();
                    return;
                }
                nonce++;
                if (nonce % 1000 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }
        }

        function createPoWWorkerURL() {
            const workerSource = `
                self.onmessage = async function(event) {
                    const { salt, targetPrefix, startNonce, step } = event.data;
                    const encoder = new TextEncoder();
                    let nonce = startNonce;

                    while (true) {
                        const msgBuffer = encoder.encode(salt + nonce);
                        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                        const hashArray = Array.from(new Uint8Array(hashBuffer));
                        const hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                        if (hash.startsWith(targetPrefix)) {
                            self.postMessage({ nonce: nonce });
                            return;
                        }

                        nonce += step;
                    }
                };
            `;

            return URL.createObjectURL(new Blob([workerSource], { type: "application/javascript" }));
        }

        async function solvePoW() {
            const startTime = Date.now();
            const form = document.getElementById("challenge-form");
            const salt = form.dataset.powSalt;
            const targetPrefix = "0".repeat(parseInt(form.dataset.powDifficulty, 10));

            if (typeof Worker === "undefined" || typeof URL.createObjectURL !== "function") {
                await solvePoWSingleThread(salt, targetPrefix, startTime);
                return;
            }

            const maxWorkers = 8;
            const availableCores = navigator.hardwareConcurrency || 4;
            const workerCount = Math.max(1, Math.min(maxWorkers, availableCores));
            const statusElement = document.querySelector(".status");

            const workerURL = createPoWWorkerURL();
            const workers = [];
            let solved = false;

            const cleanup = function() {
                for (const worker of workers) {
                    worker.terminate();
                }
                URL.revokeObjectURL(workerURL);
            };

            for (let i = 0; i < workerCount; i++) {
                const worker = new Worker(workerURL);
                workers.push(worker);

                worker.onmessage = async function(event) {
                    if (solved) {
                        return;
                    }
                    solved = true;
                    cleanup();

                    const elapsed = Date.now() - startTime;
                    if (elapsed < 2000) {
                        await new Promise(resolve => setTimeout(resolve, 2000 - elapsed));
                    }

                    document.getElementById("pow-nonce").value = event.data.nonce;
                    form.submit();
                };

                worker.onerror = async function() {
                    if (solved) {
                        return;
                    }
                    solved = true;
                    cleanup();
                    await solvePoWSingleThread(salt, targetPrefix, startTime);
                };

                worker.postMessage({
                    salt: salt,
                    targetPrefix: targetPrefix,
                    startNonce: i,
                    step: workerCount
                });
            }
        }

        window.onload = function() {
            solvePoW();
        };
    </script>
    {% endif %}
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.4;
            position: relative;
        }
        #challenge-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .status {
            position: relative;
            font-family: "SFMono-Regular", "SF Mono", Menlo, Consolas, "Courier New", monospace;
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: 0.32em;
            text-indent: 0.32em;
            text-transform: uppercase;
            color: #777777;
            text-align: center;
            padding: 0 24px;
            /* Grayscale shimmer. */
            background: linear-gradient(90deg, #555555 0%, #555555 35%, #ffffff 50%, #555555 65%, #555555 100%);
            background-size: 220% 100%;
            background-position: 120% 50%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: status-blink 1.8s ease-in-out infinite, status-shimmer 2.4s linear infinite;
        }
        @keyframes status-blink {
            0%, 100% {
                opacity: 0.72;
            }
            50% {
                opacity: 1;
            }
        }
        @keyframes status-shimmer {
            0% {
                background-position: 120% 50%;
            }
            100% {
                background-position: -20% 50%;
            }
        }
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.38;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            /* Clear the center so the fractal never sits behind the text. */
            -webkit-mask-image: radial-gradient(ellipse 42% 38% at center, transparent 0%, transparent 30%, #000 72%);
            mask-image: radial-gradient(ellipse 42% 38% at center, transparent 0%, transparent 30%, #000 72%);
        }
        #challenge-form, .footer {
            z-index: 1;
        }
        .cf-turnstile {
            margin: 0;
        }
        .footer {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-family: "SFMono-Regular", "SF Mono", Menlo, Consolas, "Courier New", monospace;
            font-size: 0.78rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #555555;
            text-align: center;
            width: calc(100% - 40px);
        }
        .footer a {
            color: #999999;
            text-decoration: none;
        }
        .footer a:hover {
            color: #ffffff;
        }
        @media (max-width: 600px) {
            body {
                font-size: 18px;
            }
            .status {
                font-size: 1.05rem;
                letter-spacing: 0.18em;
                text-indent: 0.18em;
                padding: 0 20px;
            }
            .footer {
                font-size: 0.72rem;
                letter-spacing: 0.16em;
                bottom: 24px;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <script>
        (function () {
            var canvas = document.getElementById("bg");
            var ctx = canvas.getContext("2d");
            // Pixely look: render at a low internal resolution, CSS scales it up.
            var PIXEL = 5;
            var MAX_ITER = 88;
            var LOG2 = Math.LN2;
            // Throttle so the animation never starves the PoW workers.
            var FPS = 6;
            var frameInterval = 1000 / FPS;

            var w = 1, h = 1, img = null, data = null, aspect = 1;

            function resize() {
                w = Math.max(1, Math.ceil(window.innerWidth / PIXEL));
                h = Math.max(1, Math.ceil(window.innerHeight / PIXEL));
                canvas.width = w;
                canvas.height = h;
                img = ctx.createImageData(w, h);
                data = img.data;
                aspect = w / h;
            }

            function render(t) {
                // Animate the Julia constant, staying in the dendritic region
                // (self-similar branching filaments = recognizably fractal).
                var ang = t * 0.00009;
                var cX = -0.77 + 0.035 * Math.cos(ang);
                var cY = 0.135 + 0.035 * Math.sin(ang);
                // Gentle breathing zoom + pan.
                var zoom = 2.6 + 0.3 * Math.sin(t * 0.00006);
                var panX = 0.18 * Math.sin(t * 0.00004);
                var panY = 0.18 * Math.cos(t * 0.000035);

                for (var py = 0; py < h; py++) {
                    for (var px = 0; px < w; px++) {
                        var zx = (px / w - 0.5) * zoom * aspect + panX;
                        var zy = (py / h - 0.5) * zoom + panY;

                        var x = zx, y = zy, i = 0, mag = 0;
                        for (; i < MAX_ITER; i++) {
                            var x2 = x * x - y * y + cX;
                            y = 2 * x * y + cY;
                            x = x2;
                            mag = x * x + y * y;
                            if (mag > 256) break;
                        }

                        var c;
                        if (i >= MAX_ITER) {
                            // Interior: very dark, faint inner glow keeps the body present.
                            c = 0.04;
                        } else {
                            // Smooth (continuous) escape count -> clean fractal contours.
                            var nu = i + 1 - Math.log(Math.log(mag) * 0.5) / LOG2;
                            // Self-similar contour bands following the boundary filaments.
                            var band = 0.5 + 0.5 * Math.sin(nu * 0.75 + t * 0.0004);
                            var depth = nu / MAX_ITER;        // bright near the boundary
                            c = Math.pow(band, 1.2) * Math.pow(depth, 0.4);
                        }

                        var g = Math.min(255, 22 + c * 110);
                        var idx = (py * w + px) * 4;
                        data[idx]     = g; // R
                        data[idx + 1] = g; // G
                        data[idx + 2] = g; // B
                        data[idx + 3] = 255;
                    }
                }
                ctx.putImageData(img, 0, 0);
            }

            var last = 0;
            var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

            function loop(t) {
                if (t - last >= frameInterval) {
                    last = t;
                    render(t);
                }
                requestAnimationFrame(loop);
            }

            resize();
            var resizeTimer;
            window.addEventListener("resize", function () {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(resize, 200);
            });

            if (reduce) {
                render(0); // single static frame
            } else {
                requestAnimationFrame(loop);
            }
        })();
    </script>
    <form id="challenge-form" method="POST" action="/challenge/verify" data-pow-salt="{{ pow_salt }}" data-pow-difficulty="{{ pow_difficulty }}">
        <div class="status">Checking your browser</div>
        <input type="hidden" name="original_url" value="{{ original_url }}">
        {% if site_key %}
        <div class="cf-turnstile" data-sitekey="{{ site_key }}" data-callback="submitForm"></div>
        {% else %}
        <input type="hidden" name="pow_nonce" id="pow-nonce" value="">
        {% endif %}
    </form>
    <div class="footer">
        <span>DDoS protection by <a href="https://hegy.xyz" target="_blank" rel="noopener noreferrer">Hegy.xyz</a></span>
    </div>
</body>
</html>
